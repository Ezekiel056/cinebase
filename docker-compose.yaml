services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

  # DATABASES --------
  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
    volumes:
      - ./databases/mongodb:/data/db
    restart: always

  mysql:
    volumes:
      - ./databases/mysql:/var/lib/mysql
      - ./docker/databases_init/mysql/:/docker-entrypoint-initdb.d

    image: mysql:latest

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD}
    restart: always

  # DB MANAGERS ---------

  dbgate:
    image: dbgate/dbgate
    restart: always
    ports:
      - 8082:3000
    volumes:
      - dbgate-data:/root/.dbgate
    environment:
      CONNECTIONS: con1

      LABEL_con1: MongoDB
      URL_con1: mongodb://mongodb
      ENGINE_con1: mongo@dbgate-plugin-mongo

  phpmyadmin:
    image: phpmyadmin
    ports:
      - 8081:80
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

  # SERVICES MAIL --------
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

# VOLUMES  -------
volumes:
  dbgate-data:
